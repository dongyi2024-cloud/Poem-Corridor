<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诗廊 - Poem Loop</title>
    <style>
        /* ==================== CSS 样式 ==================== */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;600&display=swap');

        :root {
            --sidebar-width: 360px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #0a0a0f;
            font-family: 'Noto Serif SC', serif;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: left 0.4s ease;
        }

        #canvas-container {
            /* 画布全屏 */
        }

        /* 侧边栏 */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: var(--sidebar-width);
            height: 100%;
            background: rgba(15, 15, 20, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid rgba(232, 228, 220, 0.1);
            z-index: 200;
            transform: translateX(-100%);
            transition: transform 0.4s ease;
            display: flex;
            flex-direction: column;
        }

        .sidebar.open {
            transform: translateX(0);
        }

        .sidebar-toggle {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 44px;
            height: 44px;
            background: rgba(15, 15, 20, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(232, 228, 220, 0.2);
            border-radius: 8px;
            color: rgba(232, 228, 220, 0.8);
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 201;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sidebar-toggle:hover {
            background: rgba(232, 228, 220, 0.15);
            border-color: rgba(232, 228, 220, 0.4);
        }

        .sidebar.open + .sidebar-toggle {
            left: calc(var(--sidebar-width) + 20px);
        }

        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid rgba(232, 228, 220, 0.1);
        }

        .sidebar-title {
            font-size: 0.7rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            color: rgba(232, 228, 220, 0.5);
            text-transform: uppercase;
        }

        .sidebar-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .sidebar-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .section-label {
            font-size: 0.65rem;
            font-weight: 300;
            letter-spacing: 0.2em;
            color: rgba(232, 228, 220, 0.4);
            text-transform: uppercase;
        }

        .poem-input {
            width: 100%;
            height: 240px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(232, 228, 220, 0.15);
            border-radius: 6px;
            padding: 14px;
            font-family: 'Noto Serif SC', serif;
            font-size: 0.85rem;
            color: #e8e4dc;
            line-height: 1.8;
            resize: none;
            transition: border-color 0.3s ease;
        }

        .poem-input:focus {
            outline: none;
            border-color: rgba(232, 228, 220, 0.4);
        }

        .poem-input::placeholder {
            color: rgba(232, 228, 220, 0.3);
        }

        .sidebar-btn {
            padding: 12px 20px;
            font-family: 'Noto Serif SC', serif;
            font-size: 0.8rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            color: #e8e4dc;
            background: transparent;
            border: 1px solid rgba(232, 228, 220, 0.25);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .sidebar-btn:hover {
            background: rgba(232, 228, 220, 0.1);
            border-color: rgba(232, 228, 220, 0.5);
        }

        .sidebar-btn:active {
            background: rgba(232, 228, 220, 0.15);
        }

        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid rgba(232, 228, 220, 0.1);
        }

        .hint-text {
            font-size: 0.7rem;
            color: rgba(232, 228, 220, 0.35);
            text-align: center;
            line-height: 1.6;
        }

        /* UI 覆盖层 */
        .ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 100;
            transition: opacity 0.8s ease-out;
        }

        .ui-overlay.sidebar-open {
            /* 固定不动 */
            left: 0 !important;
        }

        .ui-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* 进入按钮 */
        .enter-btn {
            pointer-events: auto;
            padding: 1.2rem 3rem;
            font-size: 1.1rem;
            font-family: 'Noto Serif SC', serif;
            font-weight: 300;
            letter-spacing: 0.3em;
            color: #e8e4dc;
            background: transparent;
            border: 1px solid rgba(232, 228, 220, 0.3);
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
        }

        .enter-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                120deg,
                transparent 0%,
                transparent 40%,
                rgba(232, 228, 220, 0.08) 50%,
                transparent 60%,
                transparent 100%
            );
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }

        .enter-btn:hover {
            border-color: rgba(232, 228, 220, 0.6);
            letter-spacing: 0.35em;
        }

        .enter-btn:hover::before {
            transform: translateX(100%);
        }

        /* 标题 */
        .title {
            position: fixed;
            top: 8%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75rem;
            font-weight: 300;
            letter-spacing: 0.5em;
            color: rgba(232, 228, 220, 0.4);
            text-transform: uppercase;
            z-index: 100;
            transition: opacity 0.8s ease-out;
        }

        .title.hidden {
            opacity: 0;
        }

        /* 诗句显示 */
        .poem-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            z-index: 150;
            opacity: 0;
            transition: opacity 0.5s ease;
            mix-blend-mode: difference;
            color: white;
        }

        .poem-container.visible {
            opacity: 1;
        }

        .poem-line {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.4rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            line-height: 2;
            color: #ffffff;
            white-space: pre-wrap;
            padding: 30px 60px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
        }

        /* 退出按钮 */
        .exit-btn {
            position: fixed;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Noto Serif SC', serif;
            font-size: 0.85rem;
            font-weight: 300;
            letter-spacing: 0.25em;
            color: rgba(232, 228, 220, 0.6);
            background: transparent;
            border: 1px solid rgba(232, 228, 220, 0.3);
            padding: 10px 24px;
            cursor: pointer;
            z-index: 160;
            opacity: 0;
            transition: opacity 0.5s ease, background 0.3s ease;
            pointer-events: none;
        }

        .exit-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .exit-btn:hover {
            background: rgba(232, 228, 220, 0.1);
            border-color: rgba(232, 228, 220, 0.6);
        }

        /* 暂停按钮 */
        .pause-btn {
            position: fixed;
            top: 6%;
            right: 3%;
            font-family: 'Noto Serif SC', serif;
            font-size: 0.85rem;
            font-weight: 300;
            letter-spacing: 0.25em;
            color: rgba(232, 228, 220, 0.6);
            background: transparent;
            border: 1px solid rgba(232, 228, 220, 0.3);
            padding: 10px 24px;
            cursor: pointer;
            z-index: 160;
            opacity: 0;
            transition: opacity 0.5s ease, background 0.3s ease;
            pointer-events: none;
        }

        .pause-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .pause-btn:hover {
            background: rgba(232, 228, 220, 0.1);
            border-color: rgba(232, 228, 220, 0.6);
        }

        .pause-btn.paused {
            border-color: rgba(232, 228, 220, 0.8);
            color: rgba(232, 228, 220, 0.9);
        }

        /* 沉浸提示 */
        .vibe-hint {
            position: fixed;
            bottom: 8%;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Noto Serif SC', serif;
            font-size: 0.7rem;
            font-weight: 300;
            letter-spacing: 0.2em;
            color: rgba(232, 228, 220, 0.25);
            z-index: 150;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .vibe-hint.visible {
            opacity: 1;
        }

        /* 加载提示 */
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.8rem;
            letter-spacing: 0.3em;
            color: rgba(232, 228, 220, 0.3);
            z-index: 200;
            transition: opacity 0.5s ease;
        }

        .loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* 操作提示 */
        .controls-hint {
            position: fixed;
            top: 3%;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Noto Serif SC', serif;
            font-size: 0.75rem;
            font-weight: 300;
            letter-spacing: 0.2em;
            color: rgba(232, 228, 220, 0.35);
            z-index: 160;
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }

        .controls-hint.visible {
            opacity: 1;
        }

        /* 状态提示 */
        .status-toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(15, 15, 20, 0.8);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 6px;
            font-size: 0.75rem;
            color: rgba(232, 228, 220, 0.6);
            z-index: 300;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .status-toast.visible {
            opacity: 1;
        }
    </style>
</head>
<body>
    <!-- 侧边栏 -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-title">Poe Loop Generator</div>
        </div>
        <div class="sidebar-content">
            <div class="sidebar-section">
                <div class="section-label">输入区 / Input</div>
                <textarea class="poem-input" id="poem-input" placeholder="在此输入英文诗句，每行一句...&#10;Shall I compare thee to a summer's day?&#10;Thou art more lovely and more temperate"></textarea>
                <button class="sidebar-btn" id="create-btn">Create Loop</button>
            </div>
            <div class="sidebar-section">
                <div class="section-label">导出区 / Export</div>
                <button class="sidebar-btn" id="export-btn">Export Model (.glb)</button>
            </div>
        </div>
        <div class="sidebar-footer">
            <div class="hint-text">生成后可点击 Enter 进入<br>按 W 步进式移动</div>
        </div>
    </div>

    <!-- 侧边栏 Toggle -->
    <button class="sidebar-toggle" id="sidebar-toggle">☰</button>

    <!-- 加载提示 -->
    <div class="loading" id="loading">LOADING...</div>

    <!-- 3D 画布容器 -->
    <div id="canvas-container"></div>

    <!-- 标题 -->
    <div class="title" id="title">Poem</div>

    <!-- UI 覆盖层 -->
    <div class="ui-overlay" id="ui-overlay">
        <button class="enter-btn" id="enter-btn">Enter the Poem</button>
    </div>

    <!-- 诗句显示 -->
    <div class="poem-container" id="poem-container">
        <div class="poem-line" id="poem-line"></div>
    </div>

    <!-- 沉浸提示 -->
    <div class="vibe-hint" id="vibe-hint">感受呼吸 · Feel the Breath</div>

    <!-- 操作提示 -->
    <div class="controls-hint" id="controls-hint">按 W 前进 · ESC 退出</div>

    <!-- 退出按钮 -->
    <button class="exit-btn" id="exit-btn">退出 Loop · Exit</button>

    <!-- 暂停按钮 -->
    <button class="pause-btn" id="pause-btn">暂停 · Pause</button>

    <!-- 状态提示 -->
    <div class="status-toast" id="status-toast"></div>

    <!-- ==================== 模块化 Three.js ==================== -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
            "gsap": "https://esm.sh/gsap@3.12.5",
            "./poem_generator.js": "./poem_generator.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import * as PG from './poem_generator.js';
        import gsap from 'gsap';

        // ==================== 侧边栏控制 ====================
        const sidebar = document.getElementById('sidebar');
        const sidebarToggle = document.getElementById('sidebar-toggle');
        const canvasContainer = document.getElementById('canvas-container');
        const uiOverlay = document.getElementById('ui-overlay');

        sidebarToggle.addEventListener('click', () => {
            sidebar.classList.toggle('open');
            canvasContainer.classList.toggle('sidebar-open');
            uiOverlay.classList.toggle('sidebar-open');
        });

        // ==================== 初始化 ====================
        function showToast(message) {
            const toast = document.getElementById('status-toast');
            toast.textContent = message;
            toast.classList.add('visible');
            setTimeout(() => toast.classList.remove('visible'), 2000);
        }

        async function init() {
            const { scene, camera, renderer, clock } = PG.init('canvas-container', () => {
                document.getElementById('loading').classList.add('hidden');
            });

            // 绑定事件
            bindEvents();

            // 初始俯瞰视角
            camera.position.set(0, PG.getConfig().overview.altitude, PG.getConfig().overview.distance);
            camera.lookAt(0, 0, 0);

            // 开始渲染循环
            PG.animate();
        }

        // ==================== 事件绑定 ====================
        function bindEvents() {
            window.addEventListener('resize', PG.onWindowResize);

            // Create 按钮
            document.getElementById('create-btn').addEventListener('click', () => {
                const text = document.getElementById('poem-input').value.trim();
                if (!text) {
                    showToast('请输入诗句');
                    return;
                }
                PG.rebuildModel(text);
                showToast('模型已生成');
            });

            // Export 按钮
            document.getElementById('export-btn').addEventListener('click', () => {
                const group = PG.getScene().getObjectByName('PoemLoopGroup');
                if (group) {
                    PG.exportToGLB(group, 'emotion_loop.glb');
                    showToast('导出完成');
                } else {
                    showToast('无模型可导出');
                }
            });

            // Enter 按钮
            document.getElementById('enter-btn').addEventListener('click', onEnterClick);

            // Exit 按钮
            document.getElementById('exit-btn').addEventListener('click', exitLoop);

            // Pause 按钮
            const pauseBtn = document.getElementById('pause-btn');
            pauseBtn.addEventListener('click', () => {
                const isPaused = PG.getPaused();
                PG.setPaused(!isPaused);
                pauseBtn.textContent = isPaused ? '暂停 · Pause' : '继续 · Resume';
                pauseBtn.classList.toggle('paused', !isPaused);
            });

            // 键盘事件
            window.addEventListener('keydown', onKeyDown);
        }

        // ==================== 按 W 步进式移动 ====================
        function moveForwardStep() {
            if (PG.getIsMoving() || PG.getCurrentPoemIndex() >= PG.getPoemLines().length - 1) return;
            PG.setIsMoving(true);

            const currentIndex = PG.getCurrentPoemIndex() + 1;
            PG.setCurrentPoemIndex(currentIndex);

            const startTheta = PG.getLoopTheta();
            const targetTheta = startTheta + PG.getConfig().loop.stepAngle;
            const thetaObj = { value: startTheta };

            gsap.to(thetaObj, {
                value: targetTheta,
                duration: PG.getConfig().loop.moveDuration,
                ease: PG.getConfig().loop.moveEase,
                onUpdate: function() {
                    PG.setLoopTheta(thetaObj.value);
                },
                onComplete: function() {
                    PG.setLoopTheta(targetTheta);
                    PG.setIsMoving(false);
                }
            });

            showPoemLine(PG.getPoemLines()[currentIndex]);
        }

        function showPoemLine(text) {
            const poemEl = document.getElementById('poem-line');
            poemEl.textContent = text;

            gsap.fromTo('#poem-container',
                { opacity: 0 },
                {
                    opacity: 1,
                    duration: 0.8,
                    onComplete: () => {
                        gsap.to('#poem-container', {
                            opacity: 0,
                            duration: 0.6,
                            delay: 3.5
                        });
                    }
                }
            );
        }

        // ==================== 键盘事件 ====================
        function onKeyDown(event) {
            if (!PG.getIsLooping() || PG.getIsMoving()) return;

            const key = event.key.toLowerCase();
            if (key === 'w') {
                moveForwardStep();
            }
            if (event.key === ' ') {
                const isPaused = PG.getPaused();
                PG.setPaused(!isPaused);
                const pauseBtn = document.getElementById('pause-btn');
                pauseBtn.textContent = isPaused ? '暂停 · Pause' : '继续 · Resume';
                pauseBtn.classList.toggle('paused', !isPaused);
            }
            if (event.key === 'escape') {
                exitLoop();
            }
        }

        // 主页面空格暂停（未进入loop时）
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !PG.getIsLooping() && !PG.getEntering()) {
                e.preventDefault();
                const isPaused = PG.getPaused();
                PG.setPaused(!isPaused);
                const pauseBtn = document.getElementById('pause-btn');
                pauseBtn.classList.toggle('visible', !isPaused);
                pauseBtn.classList.toggle('paused', !isPaused);
                pauseBtn.textContent = isPaused ? '继续 · Resume' : '暂停 · Pause';
            }
        });

        // ==================== 点击进入 ====================
        function onEnterClick() {
            if (PG.getEntering()) return;
            PG.setEntering(true);

            gsap.to('#ui-overlay', { opacity: 0, duration: 1, ease: 'power2.out' });
            gsap.to('#title', { opacity: 0, duration: 0.8, ease: 'power2.out' });

            const startTheta = 0;
            const CONFIG = PG.getConfig();
            const startX = CONFIG.loop.radius * Math.cos(startTheta);
            const startZ = CONFIG.loop.radius * Math.sin(startTheta);

            // 摄像机过渡
            gsap.to(PG.getCamera().position, {
                x: startX,
                y: CONFIG.loop.height,
                z: startZ,
                duration: CONFIG.transition.duration,
                ease: CONFIG.transition.ease
            });

            // 雾效加浓
            const fogObj = { density: CONFIG.fog.overviewDensity };
            gsap.to(fogObj, {
                density: CONFIG.fog.loopDensity,
                duration: CONFIG.transition.duration,
                ease: CONFIG.transition.ease,
                onUpdate: () => {
                    PG.setFogDensity(fogObj.density);
                }
            });

            // 动画完成
            setTimeout(() => {
                PG.setLooping(true);
                PG.setLoopTheta(startTheta);
                PG.setCurrentPoemIndex(-1);
                PG.setIsMoving(false);

                gsap.to('#vibe-hint', { opacity: 1, duration: 1.5, delay: 0.5 });
                gsap.to('#controls-hint', { opacity: 1, duration: 1, delay: 0.8 });
                gsap.to('#exit-btn', { opacity: 1, duration: 1, delay: 1.2 });
                document.getElementById('exit-btn').classList.add('visible');
                document.getElementById('pause-btn').classList.add('visible');
                PG.setPaused(false);
                document.getElementById('pause-btn').classList.remove('paused');
                document.getElementById('pause-btn').textContent = '暂停 · Pause';
            }, CONFIG.transition.duration * 1000);
        }

        // ==================== 退出 ====================
        function exitLoop() {
            if (!PG.getIsLooping()) return;
            PG.setLooping(false);
            PG.setCurrentPoemIndex(-1);
            PG.setIsMoving(false);

            const CONFIG = PG.getConfig();

            gsap.to('#vibe-hint', { opacity: 0, duration: 0.5 });
            gsap.to('#controls-hint', { opacity: 0, duration: 0.5 });
            gsap.to('#poem-container', { opacity: 0, duration: 0.3 });
            gsap.to('#exit-btn', {
                opacity: 0,
                duration: 0.5,
                onComplete: () => {
                    document.getElementById('exit-btn').classList.remove('visible');
                }
            });
            gsap.to('#pause-btn', { opacity: 0, duration: 0.5 });
            document.getElementById('pause-btn').classList.remove('visible');

            // 返回俯瞰
            gsap.to(PG.getCamera().position, {
                x: 0,
                y: CONFIG.overview.altitude,
                z: CONFIG.overview.distance,
                duration: CONFIG.transition.duration,
                ease: CONFIG.transition.ease
            });

            // 雾效变淡
            const fogObj = { density: CONFIG.fog.loopDensity };
            gsap.to(fogObj, {
                density: CONFIG.fog.overviewDensity,
                duration: CONFIG.transition.duration,
                ease: CONFIG.transition.ease,
                onUpdate: () => {
                    PG.setFogDensity(fogObj.density);
                },
                onComplete: () => {
                    PG.setEntering(false);
                }
            });

            gsap.to('#ui-overlay', {
                opacity: 1,
                duration: 1.5,
                ease: 'power2.out',
                delay: 1
            });
            gsap.to('#title', {
                opacity: 1,
                duration: 1.5,
                ease: 'power2.out',
                delay: 1
            });
        }

        // ==================== 启动 ====================
        init().catch(console.error);
    </script>
</body>
</html>
